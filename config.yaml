# Alpha因子挖掘系统配置文件 v2.1

# 市场配置
market: a_share  # 'a_share' (A股) 或 'us' (美股)

# 数据配置
data:
  # 首选数据源 (None则按市场自动选择)
  preferred_source: null
  
  # 备选降级数据源
  fallback_sources: null
  
  # 缓存目录
  cache_dir: ./data_cache
  
  # 数据时间范围
  start_date: "2020-01-01"
  end_date: "2023-12-31"
  
  # 股票池 'all'表示全市场，或者指定代码列表
  symbols: all
  
  # Tushare token (如果使用tushare)
  tushare_token: null

# 因子生成配置
factor_generation:
  # 生成模式: 'expression' / 'gplearn' / 'deep_alpha'
  mode: expression
  
  # 手动表达式因子
  expressions:
    - "rank(ts_mean(close,20)/close)"
    - "rank(ts_delta(close,5))"
    - "-rank(ts_std(return_1d,20))"
    - "ts_zscore(volume,10)*-1"
    - "rank(close_vwap_diff)"
    - "rank(ts_mean(close,10)/close)-rank(ts_mean(close,60)/close)"
    - "rank(high_low_ratio)"
    - "-rank(ts_corr(close,volume,20))"
    - "-rank(ts_mean(return_1d,5))"
    - "ts_skew(return_1d,20)"
    - "ts_kurt(return_1d,60)"
  
  # 遗传编程参数
  gp:
    population_size: 100
    generations: 15
    top_n: 5
  
  # 深度网络参数
  deep_alpha:
    model_type: dnn  # 'dnn' / 'lstm' / 'transformer'
    hidden_layers: [128, 64, 32]
    num_output_factors: 10
    epochs: 30
    sequence_length: 20

# 评估配置
evaluation:
  n_groups: 5
  train_ratio: 0.8
  neutralize: false
  forward_return_col: return_1d

# 筛选配置
filter:
  min_train_icir: 0.3
  min_test_ic_mean: 0.01
  min_ls_sharpe_train: 0.5

# 输出配置
output:
  results_dir: ./results
  top_n_charts: 5
  save_full_results: true
